<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>JS Taschenrechner</title><link rel="stylesheet" href="style.css"></head><body><main><h1>Taschenrechner</h1><form id="calc"><input id="a" type="number" step="any" required><select id="op"><option value="+">+</option><option value="-">-</option><option value="*">*</option><option value="/">/</option></select><input id="b" type="number" step="any" required><button>Berechnen</button></form><output id="result">–</output></main><script src="app.js"></script></body></html>
